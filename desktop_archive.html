<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Archive - 档案调查</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; user-select: none; }
        body { width: 100vw; height: 100vh; overflow: hidden; background-color: #1a2a3a; display: flex; justify-content: center; align-items: center; position: relative; }
        .lang-en .zh { display: none; } .lang-zh .en { display: none; }
        
        .mac-menu-bar { position: absolute; top: 0; width: 100%; height: 24px; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; color: white; font-size: 13px; font-weight: 500; z-index: 1000; }
        .menu-left, .menu-right { display: flex; gap: 15px; align-items: center; }
        .menu-left span:first-child { font-weight: 800; font-size: 14px;}

        .mac-window { background: #f5f5f5; border-radius: 10px; box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.2) inset; display: flex; flex-direction: column; overflow: hidden; position: absolute; animation: popIn 0.4s forwards; }
        @keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .title-bar { height: 28px; background: #ececec; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #ddd; }
        .traffic-lights { display: flex; gap: 8px; width: 60px; } .traffic-lights div { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
        .close-btn { background: #ff5f56; } .min-btn { background: #ffbd2e; } .max-btn { background: #27c93f; }
        .window-title { flex: 1; text-align: center; font-size: 12px; font-weight: bold; color: #555; margin-right: 60px; }

        .archive-window { width: 900px; height: 600px; z-index: 10; }
        .archive-header { background: linear-gradient(180deg, #1d5ca3 0%, #0d3c75 100%); color: white; padding: 15px 20px; font-size: 20px; font-weight: bold; letter-spacing: 2px; border-bottom: 3px solid #b82b2b; }
        .archive-body { display: flex; flex: 1; background: #fff; }
        .archive-sidebar { width: 250px; background: #f8fafd; border-right: 1px solid #c5d6e6; padding: 20px; display: flex; flex-direction: column; }
        .search-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; }
        .search-group label { font-size: 13px; font-weight: bold; color: #0d3c75; }
        .search-group input { padding: 8px 10px; border: 1px solid #8ca6c2; border-radius: 3px; outline: none; font-size: 14px; }
        .search-group button { background: #1d5ca3; color: white; border: none; padding: 8px; border-radius: 3px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .search-group button:hover { background: #144680; }

        .history-title { font-size: 12px; font-weight: bold; color: #666; border-bottom: 1px dashed #ccc; padding-bottom: 5px; margin-bottom: 10px; }
        .history-list { list-style: none; font-size: 12px; color: #555; display: flex; flex-direction: column; gap: 8px; }
        .history-list li { background: #eaf1f8; padding: 5px 8px; border-radius: 3px; border-left: 3px solid #1d5ca3; }

        .archive-content { flex: 1; padding: 20px; display: flex; flex-direction: column; }
        .result-status { font-size: 13px; color: #666; margin-bottom: 15px; }
        .archive-table { width: 100%; border-collapse: collapse; }
        .archive-table th, .archive-table td { border-bottom: 1px solid #eee; padding: 12px; text-align: left; font-size: 14px; }
        .archive-table th { background: #f0f5fa; color: #333; font-weight: bold; }
        .archive-table tr:hover { background: #f9f9f9; }
        .view-btn { color: #1d5ca3; text-decoration: none; font-weight: bold; cursor: pointer; }

        /* Entropy 涂黑机制 CSS */
        .entropy-mask { transition: background-color 0.3s ease-in, color 0.3s ease-in; display: inline-block; }
        .entropy-mask.blacked-out { background-color: #111 !important; color: #111 !important; user-select: none; }
    </style>
</head>
<body id="body-container">

    <div class="mac-menu-bar">
        <div class="menu-left"><span></span><span>Finder</span><span>File</span><span>Edit</span><span>View</span><span>Go</span><span>Window</span><span>Help</span></div>
        <div class="menu-right"><span>💬</span><span>🌐</span><span>🔋 78%</span><span>🔍</span><span>Sat Feb 15 03:12</span></div>
    </div>

    <div class="mac-window archive-window">
        <div class="title-bar">
            <div class="traffic-lights"><div class="close-btn" onclick="window.close()"></div><div class="min-btn"></div><div class="max-btn"></div></div>
            <div class="window-title"><span class="zh">县政府旧档案数据库</span><span class="en">County Gov Old Archive Database</span></div>
        </div>
        <div class="archive-header"><span class="zh">鹤山县档案局数字化检索系统</span><span class="en">Heshan County Archives Digital Retrieval System</span></div>
        <div class="archive-body">
            <div class="archive-sidebar">
                <div class="search-group">
                    <label><span class="zh">全局检索</span><span class="en">Global Search</span></label>
                    <input type="text" id="searchInput" onkeypress="handleEnter(event)">
                    <button onclick="performSearch()"><span class="zh">检索档案</span><span class="en">Search Archives</span></button>
                </div>
                <div class="history-title"><span class="zh">检索日志</span><span class="en">Search Log</span></div>
                <ul class="history-list" id="historyList"></ul>
            </div>
            
            <div class="archive-content">
                <div class="result-status" id="resultStatus">
                    <span class="zh">系统就绪。请输入关键词进行检索。</span><span class="en">System ready. Enter keywords to search.</span>
                </div>
                <table class="archive-table">
                    <thead>
                        <tr>
                            <th width="25%"><span class="zh">档案编号</span><span class="en">Archive ID</span></th>
                            <th width="55%"><span class="zh">卷宗题名</span><span class="en">File Title</span></th>
                            <th width="20%"><span class="zh">操作</span><span class="en">Action</span></th>
                        </tr>
                    </thead>
                    <tbody id="resultBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="score_system.js"></script>
    <script>
        let typeAudioCtx = null;
        function playTypingSound() {
            if (!typeAudioCtx) { try { typeAudioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){return;} }
            if (typeAudioCtx.state === 'suspended') typeAudioCtx.resume();
            let osc = typeAudioCtx.createOscillator(); let gain = typeAudioCtx.createGain(); let filter = typeAudioCtx.createBiquadFilter();
            osc.type = 'square'; osc.frequency.setValueAtTime(300 + Math.random() * 100, typeAudioCtx.currentTime);
            filter.type = 'highpass'; filter.frequency.setValueAtTime(1500, typeAudioCtx.currentTime);
            gain.gain.setValueAtTime(0.03, typeAudioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.0001, typeAudioCtx.currentTime + 0.04);
            osc.connect(filter); filter.connect(gain); gain.connect(typeAudioCtx.destination);
            osc.start(); osc.stop(typeAudioCtx.currentTime + 0.05);
        }
        document.addEventListener('keydown', (e) => { if (e.target.tagName === 'INPUT') playTypingSound(); });

        window.addEventListener('storage', (e) => { if (e.key === 'force_close_all') { window.close(); } });
        function syncAcousticState() { localStorage.setItem('active_acoustic_app', 'Archive'); }
        window.addEventListener('focus', syncAcousticState);

        window.applyEntropy = function() {
            const keywords = ['巡境', '北坡', '排水渠', '黑袋子', '神坛', '陈勇', '周建国'];
            const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
            const nodesToReplace = []; let node;
            while (node = walker.nextNode()) { if (node.parentElement && !['SCRIPT','STYLE','TITLE'].includes(node.parentElement.tagName) && !node.parentElement.classList.contains('entropy-mask')) { nodesToReplace.push(node); } }
            nodesToReplace.forEach(node => {
                let text = node.nodeValue; let originalText = text; const tokenMap = {};
                keywords.forEach(kw => {
                    let searchCount = parseInt(localStorage.getItem('search_count_' + kw) || '0');
                    if (searchCount >= 2) {
                        if (text.includes(kw)) {
                            let maskText = searchCount === 2 ? kw.slice(0, 1) + '█'.repeat(kw.length - 1) : '█'.repeat(kw.length);
                            let token = "[@@E-" + Math.random().toString(36).substring(2) + "@@]";
                            tokenMap[token] = `<span class="entropy-mask" data-mask="${maskText}">${kw}</span>`; text = text.split(kw).join(token);
                        }
                    }
                });
                if (text !== originalText) { Object.keys(tokenMap).forEach(t => { text = text.split(t).join(tokenMap[t]); }); const span = document.createElement('span'); span.innerHTML = text; node.parentNode.replaceChild(span, node); }
            });
            setTimeout(() => { document.querySelectorAll('.entropy-mask:not(.blacked-out)').forEach(el => { el.innerText = el.getAttribute('data-mask'); el.classList.add('blacked-out'); }); }, 300);
        };

        window.onload = function() {
            syncAcousticState();
            const savedLang = localStorage.getItem('gameLanguage') || 'zh'; document.body.className = 'lang-' + savedLang;
            const input = document.getElementById('searchInput'); input.placeholder = savedLang === 'en' ? "e.g., Patrol" : "输入关键词，例如：巡境";
            applyEntropy();

            if (localStorage.getItem('Archive_ghost_active') === 'true' && !localStorage.getItem('Archive_ghost_shown')) {
                localStorage.setItem('Archive_ghost_shown', 'true'); const historyList = document.getElementById('historyList');
                if (historyList) { const isEn = document.body.classList.contains('lang-en'); const li = document.createElement('li'); li.style.color = '#ef4444'; li.style.fontFamily = 'monospace'; li.innerText = isEn ? "[Search] Patrol Route" : "[检索] 巡境路线"; historyList.prepend(li); }
            }
        };

        const database = {
            "FILE002": { id: "HT-CWH-2025-014", title: {zh:"《巡境路线审批表（2025）》", en:"《Xunjing Route Approval Form (2025)》"}, url: "file002_approval.html" },
            "FILE021": { id: "HT-MAP-2007-042", title: {zh:"《鹤田村旧地图扫描件》", en:"《Hetian Village Old Map Scan》"}, url: "file021_map.html" },
            "FILE003": { id: "HTGA-2025-XJ-0314", title: {zh:"《出警记录单 - 鹤田派出所》", en:"《Police Dispatch Record - Hetian Station》"}, url: "file003_oa_police.html" },
            "FILE001": { id: "HT-SLZ-1982-001", title: {zh:"《1982 鹤山县水利志（节录）》", en:"《1982 Heshan Water Gazetteer (Excerpt)》"}, url: "file001_water_record.html" }
        };

        const searchMapping = { "巡境": ["FILE002"], "patrol": ["FILE002"], "北坡": ["FILE021", "FILE003"], "north slope": ["FILE021", "FILE003"], "排水渠": ["FILE001"], "drainage ditch": ["FILE001"] };

        function getCookie(n){ let m = document.cookie.match(new RegExp('(^| )'+n+'=([^;]+)')); return m?m[2]:null; }

        function handleEnter(e) { if (e.key === 'Enter') performSearch(); }

        function performSearch() {
            const input = document.getElementById('searchInput'); const keyword = input.value.trim().toLowerCase(); if (!keyword) return;
            let sc = parseInt(localStorage.getItem('search_count_' + keyword) || '0'); localStorage.setItem('search_count_' + keyword, sc + 1);

            const isEn = document.body.classList.contains('lang-en'); 
            const historyList = document.getElementById('historyList');
            const li = document.createElement('li'); li.innerText = isEn ? `[Search] ${keyword}` : `[检索] ${keyword}`; historyList.prepend(li);

            const resultBody = document.getElementById('resultBody'); const resultStatus = document.getElementById('resultStatus'); resultBody.innerHTML = ''; 

            let matchedFiles = []; if (searchMapping[keyword]) matchedFiles = searchMapping[keyword];
            for(let k in searchMapping) { if(keyword.includes(k.toLowerCase())) matchedFiles = searchMapping[k]; }

            if (matchedFiles.length > 0) {
                resultStatus.innerText = isEn ? `Search "${keyword}" complete. Found ${matchedFiles.length} records.` : `检索 "${keyword}" 完成。共找到 ${matchedFiles.length} 份相关档案。`;
                matchedFiles.forEach(k => {
                    let f = database[k];
                    resultBody.innerHTML += `<tr><td>${f.id}</td><td>${isEn ? f.title.en : f.title.zh}</td><td><a href="${f.url}" target="_blank" class="view-btn" onclick="localStorage.setItem('viewed_${k.toLowerCase()}', 'true');">${isEn ? "View ➔" : "查看全文 ➔"}</a></td></tr>`;
                });
            } else { resultStatus.innerText = isEn ? `Search "${keyword}" complete. Found 0 records.` : `检索 "${keyword}" 完成。共找到 0 份相关档案。`; }

            input.value = ''; checkChaosTrigger(keyword); setTimeout(window.applyEntropy, 100);
        }

        function checkChaosTrigger(keyword) {
            let pastEndings = getCookie('xunjing_endings') || localStorage.getItem('endings_achieved') || "";
            let shouldTrigger = false;

            // 【开发者后门】：无视前置结局 A 和 B，直接强制触发 C 结局死刑
            if (keyword === "forcec") {
                shouldTrigger = true;
            }

            // 结局 C 触发要求：当前检索包含"林砚"或"lin yan"，且玩家历史已经过 A 与 B
            if ((keyword.includes("林砚") || keyword.includes("lin yan")) && pastEndings.includes('A') && pastEndings.includes('B')) {
                shouldTrigger = true;
            }

            // 【核心修复】：如果触发结局C，立即将档案库强制关闭，防止它遮挡桌面的死亡动画！
            if (shouldTrigger) {
                localStorage.setItem('trigger_ending_c', Date.now()); 
                setTimeout(() => { window.close(); }, 300);
            }
        }
    </script>
</body>
</html>
